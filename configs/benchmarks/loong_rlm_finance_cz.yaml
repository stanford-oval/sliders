experiment: loong
system: rlm
system_config:
  models:
    main:
      model: gpt-5
    sub:
      model: gpt-5-mini
  max_iterations: 30
experiment_config:
  benchmark_path: /path/to/datasets/loong/loong_processed.jsonl
  gpt_results_path: None
  files_dir: /path/to/datasets/loong/loong_docs/
  specific_ids_csv: sample_data/50_sample_ids_finance_zh_final.csv
  soft_evaluator_model: gpt-4.1
  hard_evaluator_model: gpt-4.1
  num_questions: null
  random_state: 42
  document_config:
    chunk_size: 16000
    overlap_size: 0
  filter_by_type: "financial"
  # filter_by_level: 3
  # Priority: if specific_ids_csv is provided, it takes precedence over type/level filters
output_file: loong_rlm_finance_en_26jan.json
