experiment: finance_bench
system: chain_of_agents
system_config:
  chunk_size: 16000
  chunk_overlap: 0
  models:
    worker:
      model: gpt-4.1-mini
      max_tokens: 8192
      temperature: 0.0
    manager:
      model: gpt-4.1
      max_tokens: 2048
      temperature: 0.0
experiment_config:
  benchmark_path: /path/to/datasets/financebench/data/financebench_open_source.jsonl
  gpt_results_path: /path/to/datasets/financebench/results/gpt-4_oracle_reverse.jsonl
  files_dir: /path/to/datasets/financebench/markdown/pdfs/
  soft_evaluator_model: gpt-4.1
  hard_evaluator_model: gpt-4.1
  num_questions: null
  random_state: 42
  docprocesssing: false
  document_config:
    chunk_size: 16000
    overlap_size: 0
output_file: finance_bench_coa.json
